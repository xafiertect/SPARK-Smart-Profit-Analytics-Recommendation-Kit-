services:
  db_test:
    image: postgres:16-alpine
    container_name: spark_db_test
    environment:
      POSTGRES_USER: spark
      POSTGRES_PASSWORD: spark_secret
      POSTGRES_DB: spark_test_db
    ports:
      - "5433:5432"
    volumes:
      - spark_pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spark -d spark_test_db"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  spark_pgdata_test:
